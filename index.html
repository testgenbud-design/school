<style>
:root{
  --bg:#080C14;--bg2:#0D1420;--bg3:#121A2B;--panel:#0F1729;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --amber:#F5A623;--amber2:#FFB84D;--amber-dim:rgba(245,166,35,0.12);
  --blue:#3B82F6;--blue-dim:rgba(59,130,246,0.1);
  --green:#10B981;--green-dim:rgba(16,185,129,0.1);--red:#EF4444;
  --text:#E8EDF5;--text2:#8892A4;--text3:#4A5568;
  --ff:'Bricolage Grotesque',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--ff);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:48px 48px;}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 600px 400px at 20% 10%,rgba(245,166,35,0.04) 0%,transparent 70%),radial-gradient(ellipse 500px 500px at 80% 80%,rgba(59,130,246,0.05) 0%,transparent 70%);}
#root{position:relative;z-index:1}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(8,12,20,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700;letter-spacing:-0.5px;color:var(--text)}
.nav-logo-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#1a1030,#0d0620);display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(245,166,35,0.28);overflow:hidden;flex-shrink:0}
.nav-logo-mark img{width:100%;height:100%;object-fit:contain;padding:3px}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-tag{font-family:var(--mono);font-size:10px;font-weight:400;color:var(--amber);background:var(--amber-dim);border:1px solid rgba(245,166,35,0.2);padding:3px 9px;border-radius:4px;letter-spacing:1px}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.nav-status{font-size:11px;color:var(--text2)}
.hero{padding:120px 32px 60px;max-width:960px;margin:0 auto;text-align:center}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--amber);background:var(--amber-dim);border:1px solid rgba(245,166,35,0.2);padding:5px 14px;border-radius:20px;margin-bottom:24px;letter-spacing:1.5px;text-transform:uppercase}
.hero-h1{font-size:clamp(36px,5vw,64px);font-weight:800;line-height:1.05;letter-spacing:-2px;color:var(--text);margin-bottom:18px}
.hero-h1 .hi{color:var(--amber)}
.hero-sub{font-size:16px;color:var(--text2);font-weight:300;max-width:580px;margin:0 auto 48px;line-height:1.8}
.hero-stats{display:flex;gap:0;justify-content:center;border:1px solid var(--border);border-radius:12px;overflow:hidden;max-width:480px;margin:0 auto;background:var(--panel)}
.hstat{flex:1;padding:16px 20px;text-align:center;border-right:1px solid var(--border)}
.hstat:last-child{border-right:none}
.hstat-n{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--amber);line-height:1}
.hstat-l{font-size:11px;color:var(--text3);margin-top:4px;letter-spacing:0.5px}
.main{max-width:1200px;margin:0 auto;padding:0 32px 80px}
.steps{display:flex;align-items:center;gap:0;margin-bottom:32px;background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;padding:0}
.step{flex:1;display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;border-right:1px solid var(--border);transition:background 0.2s;position:relative}
.step:last-child{border-right:none}
.step:hover{background:rgba(255,255,255,0.02)}
.step.active{background:rgba(245,166,35,0.06)}
.step.done{background:rgba(16,185,129,0.04)}
.step-num{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:500;border:1.5px solid var(--border2);color:var(--text3);transition:all 0.2s}
.step.active .step-num{border-color:var(--amber);color:var(--amber);background:var(--amber-dim);box-shadow:0 0 12px rgba(245,166,35,0.2)}
.step.done .step-num{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.step-info{overflow:hidden}
.step-label{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap}
.step.active .step-label{color:var(--amber)}
.step.done .step-label{color:var(--green)}
.step-desc{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.card-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.card-sub{font-size:12px;color:var(--text3);margin-top:2px}
.card-body{padding:24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid.thirds{grid-template-columns:1fr 1fr 1fr}
.field-full{grid-column:1/-1}
.field-label{display:block;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.field-label span{color:var(--amber)}
.field-hint{font-size:11px;color:var(--text3);margin-top:6px}
.tg-input{width:100%;padding:10px 14px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--ff);font-size:13.5px;transition:border-color 0.15s,box-shadow 0.15s;outline:none}

.chip-box{min-height:42px;padding:5px 8px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;display:flex;flex-wrap:wrap;gap:5px;cursor:pointer;transition:border-color 0.15s}

.chip:hover{background:rgba(245,166,35,0.25)}
.chip-x{font-size:10px;opacity:0.7}
.dropdown-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:300;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;max-height:220px;overflow-y:auto;padding:5px;box-shadow:0 16px 48px rgba(0,0,0,0.5)}
.dropdown-menu.open{display:block}
.dopt{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:7px;font-size:13px;color:var(--text2);cursor:pointer;transition:background 0.1s}
.dopt:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.dopt.sel{background:rgba(245,166,35,0.08);color:var(--amber)}
.dopt-check{width:15px;height:15px;border-radius:4px;flex-shrink:0;border:1.5px solid var(--border2);font-size:9px;display:flex;align-items:center;justify-content:center;color:var(--amber)}
.dopt.sel .dopt-check{background:var(--amber-dim);border-color:var(--amber)}
.seg{display:flex;gap:6px;flex-wrap:wrap}
.seg-btn{padding:8px 16px;border-radius:7px;font-size:12.5px;font-weight:500;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.seg-btn:hover{border-color:rgba(255,255,255,0.2);color:var(--text)}
.seg-btn.active{background:var(--amber-dim);border-color:rgba(245,166,35,0.4);color:var(--amber)}
.seg-btn.active-online{background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.4);color:#60A5FA}
.seg-btn.active-offline{background:var(--amber-dim);border-color:rgba(245,166,35,0.4);color:var(--amber)}
.seg-btn.active-easy{background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.4);color:#10B981}
.seg-btn.active-moderate{background:rgba(245,166,35,0.1);border-color:rgba(245,166,35,0.4);color:var(--amber)}
.seg-btn.active-hard{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.4);color:#EF4444}
.seg-btn.active-mixed{background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.4);color:#60A5FA}
.seg-btn.active-ai_only{background:rgba(245,166,35,0.1);border-color:rgba(245,166,35,0.4);color:var(--amber)}
.seg-btn.soon{opacity:0.45;position:relative}
.soon-tag{font-family:var(--mono);font-size:8px;letter-spacing:1px;background:rgba(245,166,35,0.2);color:var(--amber);padding:1px 5px;border-radius:3px;margin-left:2px}
.time-hint{margin-top:7px;font-family:var(--mono);font-size:11px;color:var(--amber);display:flex;align-items:center;gap:5px;opacity:0.8}
.time-dot{width:4px;height:4px;border-radius:50%;background:var(--amber)}
.divider{height:1px;background:var(--border);margin:8px 0 16px}
.btn-gen{width:100%;padding:14px 20px;border-radius:10px;background:linear-gradient(135deg,var(--amber),#E8820A);border:none;font-family:var(--ff);font-size:15px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:-0.3px;display:flex;align-items:center;justify-content:center;gap:9px;transition:all 0.2s;box-shadow:0 4px 20px rgba(245,166,35,0.25);position:relative;overflow:hidden}
.btn-gen::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);opacity:0;transition:opacity 0.2s}
.btn-gen:hover::before{opacity:1}
.btn-gen:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(245,166,35,0.35)}
.btn-gen:active{transform:translateY(0)}
.btn-gen:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-sec{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;border:1px solid var(--border2);background:var(--bg2);font-family:var(--ff);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;text-decoration:none;transition:all 0.15s}
.btn-sec:hover{border-color:rgba(255,255,255,0.25);color:var(--text);background:rgba(255,255,255,0.04)}
.btn-sec.green{border-color:rgba(16,185,129,0.3);color:var(--green);background:var(--green-dim)}
.btn-sec.green:hover{background:rgba(16,185,129,0.15)}
.btn-sec.amber{border-color:rgba(245,166,35,0.3);color:var(--amber);background:var(--amber-dim)}
.btn-sec.amber:hover{background:rgba(245,166,35,0.2)}
.btn-sec[aria-disabled="true"]{opacity:0.35;pointer-events:none;cursor:not-allowed}
.btn-download{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--amber),#E8820A);font-family:var(--ff);font-size:13px;font-weight:600;color:#fff;cursor:pointer;text-decoration:none;transition:all 0.15s;box-shadow:0 2px 12px rgba(245,166,35,0.2)}
.btn-download:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(245,166,35,0.32)}
.btn-download[aria-disabled="true"]{opacity:0.35;pointer-events:none;cursor:not-allowed;box-shadow:none;transform:none}
.loader-wrap{text-align:center;padding:12px 0 4px}
.loader-bar{height:2px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:10px}
.loader-fill{height:100%;background:linear-gradient(90deg,transparent,var(--amber),transparent);animation:scan 1.6s ease-in-out infinite;width:40%}
@keyframes scan{0%{margin-left:-40%}100%{margin-left:140%}}
.loader-txt{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:8px}
.blink{animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.err{padding:11px 16px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;font-size:12.5px;color:#FCA5A5;margin-top:12px;display:flex;align-items:flex-start;gap:9px}
.results-card{margin-top:24px}
.res-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.res-title{font-size:17px;font-weight:700;letter-spacing:-0.5px;display:flex;align-items:center;gap:10px}
.res-ok{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--green);background:var(--green-dim);border:1px solid rgba(16,185,129,0.25);padding:3px 9px;border-radius:4px}
.res-actions{display:flex;gap:8px;flex-wrap:wrap}
.meta-row{display:flex;gap:6px;flex-wrap:wrap;padding:14px 24px;border-bottom:1px solid var(--border)}
.meta-chip{font-family:var(--mono);font-size:10.5px;color:var(--text3);background:var(--bg2);border:1px solid var(--border);padding:3px 10px;border-radius:4px;letter-spacing:0.5px}
.meta-chip.amber{color:var(--amber);background:var(--amber-dim);border-color:rgba(245,166,35,0.2)}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 24px}
.tab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;margin-bottom:-1px}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--amber);border-bottom-color:var(--amber)}
.tab-content{padding:28px;max-height:560px;overflow-y:auto;font-size:14px;line-height:1.9;color:var(--text2)}
.tab-content::-webkit-scrollbar{width:4px}
.tab-content::-webkit-scrollbar-track{background:transparent}
.tab-content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.md-out strong{color:var(--text);font-weight:600}
.md-out h1,.md-out h2,.md-out h3{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--amber);margin:28px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.md-out p{margin-bottom:2px}
.md-out hr{border:none;border-top:1px solid var(--border);margin:20px 0}
.md-out code{font-family:var(--mono);font-size:0.85em;background:var(--bg2);color:var(--amber);padding:1px 6px;border-radius:4px}
.form-panel{margin-top:16px;padding:20px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
.form-panel-info{display:flex;flex-direction:column;gap:3px}
.form-panel-title{font-size:14px;font-weight:600;color:var(--text)}
.form-panel-sub{font-size:12px;color:var(--text3)}
.form-link-box{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 14px;background:var(--bg2);border:1px solid rgba(16,185,129,0.2);border-radius:8px;margin-top:8px}
.form-link-url{font-family:var(--mono);font-size:11px;color:var(--green);word-break:break-all;flex:1}
.offline-success{margin:16px 24px 20px;padding:18px 20px;background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.offline-success-info{display:flex;align-items:flex-start;gap:12px}
.offline-success-icon{font-size:28px;line-height:1}
.offline-success-title{font-size:15px;font-weight:700;color:var(--green);letter-spacing:-0.3px}
.offline-success-sub{font-size:12.5px;color:var(--text2);margin-top:3px}
.doc-actions-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px 0;text-align:center}
.doc-actions-label{font-size:12.5px;color:var(--text3)}
.doc-actions-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.scroll-fade{position:sticky;bottom:0;height:40px;background:linear-gradient(transparent,var(--panel));pointer-events:none;margin-top:-40px}
.how{padding:60px 32px;max-width:1200px;margin:0 auto}
.how-title{font-family:var(--mono);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--amber);text-align:center;margin-bottom:8px}
.how-h2{font-size:clamp(24px,3vw,36px);font-weight:800;text-align:center;letter-spacing:-1px;color:var(--text);margin-bottom:40px}
.how-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.how-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;transition:border-color 0.2s,transform 0.2s}
.how-card:hover{border-color:rgba(245,166,35,0.2);transform:translateY(-3px)}
.how-n{font-family:var(--mono);font-size:11px;color:var(--amber);letter-spacing:2px;margin-bottom:14px}
.how-icon{font-size:28px;margin-bottom:10px}
.how-ct{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:-0.3px}
.how-cp{font-size:13px;color:var(--text3);line-height:1.7}
.footer{border-top:1px solid var(--border);padding:24px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.footer-l{font-size:13px;color:var(--text3)}
.footer-r{font-family:var(--mono);font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.a1{animation:fadeUp 0.5s ease both 0.05s}
.a2{animation:fadeUp 0.5s ease both 0.15s}
.a3{animation:fadeUp 0.5s ease both 0.25s}

  .hero{padding:100px 20px 40px}
  .main{padding:0 20px 60px}

  .footer{padding:20px}

// ============================================================
// Subject-aware question types — kept in sync with subject choice
// ============================================================
function getQuestionTypes(subject){
  const s=(subject||'').trim().toLowerCase();
  const langs=['english','hindi','marathi'];
  const numericHeavy=['mathematics'];
  const sciences=['physics','chemistry'];
  if(numericHeavy.includes(s)||sciences.includes(s)){
    return ['MCQ','Assertion–Reason','Very Short Answer','Short Answer','Long Answer','Numerical / Problem-Solving','Case-Based','Mixed (All Types)'];
  }
  if(s==='biology'){
    return ['MCQ','Assertion–Reason','Very Short Answer','Short Answer','Long Answer','Diagram-Based','Case-Based','Mixed (All Types)'];
  }
  if(langs.includes(s)){
    return ['MCQ','Passage / Comprehension-Based','Grammar-Based','Very Short Answer','Short Answer','Long Answer / Essay','Literary / Extract-Based','Letter / Application Writing','Mixed (All Types)'];
  }
  if(s==='social science'){
    return ['MCQ','Assertion–Reason','Source-Based','Map-Based','Very Short Answer','Short Answer','Long Answer','Mixed (All Types)'];
  }
  if(['history','political science','sociology'].includes(s)){
    return ['MCQ','Assertion–Reason','Source-Based','Very Short Answer','Short Answer','Long Answer','Mixed (All Types)'];
  }
  if(s==='geography'){
    return ['MCQ','Assertion–Reason','Map-Based','Very Short Answer','Short Answer','Long Answer','Mixed (All Types)'];
  }
  if(s==='psychology'){
    return ['MCQ','Assertion–Reason','Case-Based','Very Short Answer','Short Answer','Long Answer','Mixed (All Types)'];
  }
  if(s==='accountancy'){
    return ['MCQ','Numerical / Problem-Solving','Very Short Answer','Short Answer','Long Answer','Case-Based','Mixed (All Types)'];
  }
  if(s==='economics'){
    return ['MCQ','Numerical / Problem-Solving','Assertion–Reason','Very Short Answer','Short Answer','Long Answer','Case-Based','Mixed (All Types)'];
  }
  if(s==='business studies'){
    return ['MCQ','Assertion–Reason','Case-Based','Very Short Answer','Short Answer','Long Answer','Mixed (All Types)'];
  }
  if(s==='computer science'||s==='computer applications'){
    return ['MCQ','Assertion–Reason','Programming / Code-Based','Very Short Answer','Short Answer','Long Answer','Case-Based','Mixed (All Types)'];
  }
  return ['MCQ','Assertion–Reason','Very Short Answer','Short Answer','Long Answer','Mixed (All Types)'];
}

function toTitle(s){return s.trim().replace(/\w\S*/g,t=>t.charAt(0).toUpperCase()+t.substr(1).toLowerCase());}
function calcTime(n,d){return Math.ceil(n*2*(d==='Easy'?0.8:d==='Hard'?1.2:1.0));}
function isValidEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((e||'').trim());}

function parseTest(raw){
  let c=raw.replace(/^=\s*/,'').trim();
  c=c.replace(/\n\s+([A-D][.)]\s)/g,'\n$1');
  c=c.replace(/^[\s\S]*?(?=(?:\*{0,2}QUESTIONS?\*{0,2}:?\s*\n|^\s*1[.)]\s))/im,'').trim();
  if(!c.match(/^(\*{0,2}QUESTIONS?|1[.)]\s)/i)){const f=c.indexOf('\n\n');if(f>0)c=c.slice(f).trim();}
  c=c.replace(/^\*{0,2}QUESTIONS?:?\*{0,2}\s*\n/im,'').trim();
  const cl=c.toLowerCase();
  const ak=cl.search(/answer\s*key/);
  return{cleaned:c,questions:ak>0?c.slice(0,ak).trim():c,answerKey:ak>0?c.slice(ak).trim():''};
}

// ---- Document URL helpers (offline branch) ----
function buildViewUrl(docId){
  return docId ? ('https://docs.google.com/document/d/'+docId+'/edit') : null;
}
function buildDownloadUrl(docId){
  return docId ? ('https://docs.google.com/document/d/'+docId+'/export?format=docx') : null;
}

// Shared component: View / Download buttons for a generated Google Doc.
function DocActionButtons({docId,downloadName}){
  const viewUrl=buildViewUrl(docId);
  const downloadUrl=buildDownloadUrl(docId);
  const disabled=!docId;
  return (
    <div className="doc-actions-row">
      <a
        className="btn-sec"
        href={viewUrl||undefined}
        target="_blank"
        rel="noreferrer"
        aria-disabled={disabled}
        onClick={e=>{if(disabled)e.preventDefault();}}
        tabIndex={disabled?-1:0}
      >
        <EyeIcon/> View Document
      </a>
      <a
        className="btn-download"
        href={downloadUrl||undefined}
        aria-disabled={disabled}
        onClick={e=>{if(disabled)e.preventDefault();}}
        download={disabled?undefined:(downloadName||true)}
        tabIndex={disabled?-1:0}
      >
        <DownloadIcon/> Download Word
      </a>
    </div>
  );
}

      <label className="field-label">Difficulty <span>*</span></label>
      <div className="seg">
        {[['Easy','🟢'],['Moderate','🟡'],['Hard','🔴'],['Mixed','🎲']].map(([d,icon])=>(
          <button key={d} className={'seg-btn '+(value===d?'active-'+d.toLowerCase():'')} onClick={()=>onChange(d)}>
            {icon} {d}
          </button>
        ))}
      </div>
    </div>
  );
}

function MultiSelect({options,selected,onChange,placeholder,disabled}){
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[]);
  const toggle=o=>onChange(selected.includes(o)?selected.filter(s=>s!==o):[...selected,o]);
  return(
    <div className="multi-wrap" ref={ref} style={{opacity:disabled?0.35:1,pointerEvents:disabled?'none':'auto'}}>
      <div className={'chip-box'+(open?' focused':'')} onClick={()=>setOpen(!open)}>
        {selected.length===0
          ?<span className="chip-ph">{placeholder}</span>
          :selected.map(s=>(
            <span key={s} className="chip" onClick={e=>{e.stopPropagation();toggle(s);}}>
              {s}<span className="chip-x">✕</span>
            </span>
          ))
        }
      </div>
      <div className={'dropdown-menu'+(open?' open':'')}>
        {options.map(o=>(
          <div key={o} className={'dopt'+(selected.includes(o)?' sel':'')} onClick={()=>toggle(o)}>
            <div className="dopt-check">{selected.includes(o)?'✓':''}</div>{o}
          </div>
        ))}
      </div>
    </div>
  );
}

function App(){
  const [step,setStep]=useState(1);
  const [testType,setTestType]=useState('online');
  const [examType,setExamType]=useState('');
  const [subject,setSubject]=useState('');
  const [chapters,setChapters]=useState([]);
  const [topics,setTopics]=useState([]);
  const [qTypes,setQTypes]=useState([]);
  const [difficulty,setDifficulty]=useState('');
  const [numQ,setNumQ]=useState('');
  const [mode,setMode]=useState('ai_only');
  const [timeLimit,setTimeLimit]=useState('');
  const [email,setEmail]=useState('');
  const [maxMarks,setMaxMarks]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [result,setResult]=useState(null);
  const [offlineDocs,setOfflineDocs]=useState(null);
  const [meta,setMeta]=useState(null);
  const [activeTab,setActiveTab]=useState('questions');
  const [formLoading,setFormLoading]=useState(false);
  const [formData,setFormData]=useState(null);
  const [formError,setFormError]=useState('');
  const resultRef=useRef(null);

  const subjects=examType?Object.keys(SYLLABUS[examType]||{}):[];
  const chapterOpts=(examType&&subject)?Object.keys(SYLLABUS[examType]?.[subject]||{}):[];
  const topicOpts=chapters.flatMap(ch=>SYLLABUS[examType]?.[subject]?.[ch]||[]);
  const qTypeOpts=subject?getQuestionTypes(subject):[];
  const suggestedTime=(numQ&&difficulty&&difficulty!=='Mixed')?calcTime(parseInt(numQ),difficulty):null;

  useEffect(()=>{if(suggestedTime)setTimeLimit(String(suggestedTime));},[numQ,difficulty]);
  useEffect(()=>{setSubject('');setChapters([]);setTopics([]);setQTypes([]);},[examType]);
  useEffect(()=>{setChapters([]);setTopics([]);setQTypes([]);},[subject]);
  useEffect(()=>{setTopics([]);},[chapters]);

  function switchTestType(tt){
    if(tt===testType)return;
    setTestType(tt);
    setError('');
    setResult(null);
    setOfflineDocs(null);
    setMeta(null);
    setFormData(null);
    setFormError('');
    setStep(1);
  }

  // "Mixed (All Types)" is exclusive — picking it clears other selections and vice versa
  function handleQTypeChange(next){
    const hadMixed=qTypes.includes('Mixed (All Types)');
    const hasMixed=next.includes('Mixed (All Types)');
    if(hasMixed&&!hadMixed){setQTypes(['Mixed (All Types)']);return;}
    if(hasMixed&&hadMixed&&next.length>1){setQTypes(next.filter(t=>t!=='Mixed (All Types)'));return;}
    setQTypes(next);
  }

  async function generate(){
    if(!examType||!subject||chapters.length===0||topics.length===0||qTypes.length===0){
      setError('Please fill in all required fields, including question type.');
      return;
    }
    if(!email.trim()){
      setError('Teacher email is required.');
      return;
    }
    if(!isValidEmail(email)){
      setError('Please enter a valid email address.');
      return;
    }
    if(testType==='online'){
      if(!difficulty||!numQ){setError('Please fill in all required fields.');return;}
    }else{
      if(!difficulty||!maxMarks){setError('Please fill in all required fields.');return;}
    }

    setError('');setLoading(true);setResult(null);setOfflineDocs(null);setFormData(null);setFormError('');

    let payload;
    if(testType==='online'){
      payload={
        test_type:'online',
        exam_type:examType,
        subject:toTitle(subject),
        chapters,topics,
        question_types:qTypes,
        difficulty,
        num_questions:parseInt(numQ),
        mode,
        time_limit:parseInt(timeLimit)||suggestedTime||20,
        teacher_email:email.trim().toLowerCase()
      };
    }else{
      payload={
        test_type:'offline',
        exam_type:examType,
        subject:toTitle(subject),
        chapters,topics,
        question_types:qTypes,
        difficulty,
        maximum_marks:parseInt(maxMarks),
        teacher_id:email.trim().toLowerCase(),
        teacher_email:email.trim().toLowerCase()
      };
    }

    // Large offline papers (e.g. 80 marks) can take several minutes to generate.
    // Give the request plenty of room before giving up.
    const FETCH_TIMEOUT_MS=6*60*1000; // 6 minutes
    const controller=new AbortController();
    const timeoutId=setTimeout(()=>controller.abort(),FETCH_TIMEOUT_MS);

    try{
      const res=await fetch(W1,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),signal:controller.signal});
      clearTimeout(timeoutId);
      const raw=await res.text();
      if(!raw||!raw.trim())throw new Error('Empty response from server (status '+res.status+')');

      if(testType==='offline'){
        let cleaned=raw.trim().replace(/^=+/,'').trim();
        let json;
        try{
          json=JSON.parse(cleaned);
        }catch(e){
          throw new Error('Unexpected response from server.');
        }
        if(typeof json==='string'){
          try{ json=JSON.parse(json); }catch(e){ /* leave as-is, handled below */ }
        }
        const obj=Array.isArray(json)?(json[0]||{}):(json||{});
        if(obj.success===false){
          throw new Error(obj.message||'Offline test generation failed.');
        }
        const questionDocumentId=obj.questionDocumentId||null;
        const keyDocumentId=obj.keyDocumentId||null;
        setOfflineDocs({questionDocumentId,keyDocumentId});
        setMeta({...payload});
        setStep(2);
        setActiveTab('questions');
        setTimeout(()=>resultRef.current?.scrollIntoView({behavior:'smooth',block:'start'}),100);
      }else{
        let text,testId;
        try{
          const j=JSON.parse(raw);
          testId=j.test_id||null;
          if(j.questions&&Array.isArray(j.questions)&&j.questions.length>0){
            let built='QUESTIONS:\n\n';
            j.questions.forEach(q=>{
              built+=q.number+'. '+q.question+'\n';
              const opts=q.options||[q.option1,q.option2,q.option3,q.option4].filter(Boolean);
              ['A','B','C','D'].forEach((l,i)=>{if(opts[i])built+=l+') '+opts[i]+'\n';});
              built+='\n';
            });
            const hasAnswers=j.questions.some(q=>q.correct_answer||q.correctAnswer||q.answer||q.correct_index!==undefined);
            if(hasAnswers){
              built+='\nANSWER KEY:\n\n';
              const labels=['A','B','C','D'];
              j.questions.forEach(q=>{
                const ans=q.correct_answer||q.correctAnswer||q.answer||labels[q.correct_index]||'A';
                const explanation=q.explanation||q.reason||'';
                built+=q.number+'. Answer: '+ans+'\n';
                if(explanation)built+='Explanation: '+explanation+'\n';
                built+='\n';
              });
            }
            text=built;
          }else{
            text=j.generated_text||j.output||j.result||raw;
          }
        }catch(e){text=raw;testId=null;}

        if(!text||!text.trim())throw new Error('Empty response. Please try again.');
        const parsed=parseTest(text);
        setResult(parsed);
        setMeta({...payload,test_id:testId});
        setStep(2);
        setActiveTab('questions');
        setTimeout(()=>resultRef.current?.scrollIntoView({behavior:'smooth',block:'start'}),100);
      }
    }catch(e){
      clearTimeout(timeoutId);
      if(e.name==='AbortError'){
        setError('Generation is taking longer than expected and timed out after 6 minutes. Large offline papers (e.g. 80 marks) can take several minutes — please try again.');
      }else{
        setError('Generation failed: '+e.message);
      }
    }
    finally{setLoading(false);}
  }

  async function createForm(){
    if(!meta?.test_id){setFormError('No Test ID — please regenerate.');return;}
    setFormLoading(true);setFormError('');
    const payload={test_id:meta.test_id};
    try{
      const res=await fetch(W2,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(!res.ok)throw new Error('Server error '+res.status);
      const data=await res.json();
      if(data.form_link)data.form_link=data.form_link.replace(/^=+/,'');
      if(data.edit_link)data.edit_link=data.edit_link.replace(/^=+/,'');
      setFormData(data);
    }catch(e){setFormError('Form creation failed: '+e.message);}
    finally{setFormLoading(false);}
  }

  const stepsConfig=testType==='online'
    ?[
      {n:1,label:'Configure',desc:'Class, subject & topics'},
      {n:2,label:'Generate',desc:'AI creates questions'},
      {n:3,label:'Deliver',desc:'Google Form for students'}
    ]
    :[
      {n:1,label:'Configure',desc:'Class, subject & marks'},
      {n:2,label:'Generate',desc:'AI creates questions'},
      {n:3,label:'Download',desc:'Download Word file'}

    <>

        <div className="nav-logo">
          <div className="nav-logo-mark"><img src={LOGO_SRC} alt="myTST logo"/></div>
          myTST
        </div>
        <div className="nav-right">
          <div className="nav-dot"/>
          <span className="nav-status">Live</span>
          <span className="nav-tag">CBSE · CLASS 10–12</span>
        </div>
      </nav>

      {/* HERO */}
      <div className="hero">
        <div className="hero-eyebrow a1">⚡ AI-Powered Test Generation</div>
        <h1 className="hero-h1 a2">
          Generate <span className="hi">Online &amp; Offline CBSE Tests</span><br/>in Seconds
        </h1>
        <p className="hero-sub a3">
          Syllabus-aligned question papers for Class 10–12, every stream and subject. Create auto-graded Google Forms for online delivery or printable Word papers for offline classrooms.
        </p>
        <div className="hero-stats a4">
          {[['30s','Generation'],['Class 10–12','All Streams'],['20+','Subjects']].map(([n,l])=>(
            <div key={l} className="hstat">
              <div className="hstat-n">{n}</div>
              <div className="hstat-l">{l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* MAIN */}
      <div className="main">
        {/* STEP INDICATOR */}
        <div className="steps a4">
          {stepsConfig.map(s=>(
            <div key={s.n} className={'step '+(step===s.n?'active':step>s.n?'done':'')} onClick={()=>s.n<=step&&setStep(s.n)}>
              <div className="step-num">{step>s.n?'✓':s.n}</div>
              <div className="step-info">
                <div className="step-label">{s.label}</div>
                <div className="step-desc">{s.desc}</div>
              </div>
            </div>
          ))}
        </div>

        {/* FORM CARD */}
        <div className="card a4">
          <div className="card-header">
            <div>
              <div className="card-title">Test Configuration</div>
              <div className="card-sub">Configure your test parameters below</div>
            </div>
            {meta&&<span className="res-ok">✓ Test Ready</span>}
          </div>
          <div className="card-body">

            {/* Test Type */}
            <div style={{marginBottom:'20px'}}>
              <label className="field-label">Test Type <span>*</span></label>
              <div className="seg">
                <button className={'seg-btn '+(testType==='online'?'active-online':'')} onClick={()=>switchTestType('online')}>🌐 Online Test</button>
                <button className={'seg-btn '+(testType==='offline'?'active-offline':'')} onClick={()=>switchTestType('offline')}>📝 Offline Test</button>
              </div>
            </div>

            <div className="divider"/>

            {/* Shared Fields: Class, Subject, Chapters, Topics, Question Type, Email */}

                  <div>

                    <input className="tg-input" type="number" placeholder="e.g. 10" min="1" max="30" value={numQ} onChange={e=>setNumQ(e.target.value)}/>

                  <div>

                  </div>

                <div className="divider"/>

                <div style={{marginBottom:'8px'}}>
                  <label className="field-label">Generation Mode</label>
                  <div className="seg">

                    <button className="seg-btn soon" onClick={()=>setMode('pyq')}>📚 PYQ Only <span className="soon-tag">SOON</span></button>
                  </div>
                </div>

            {/* ── OFFLINE-ONLY FIELDS ── */}
            {testType==='offline' && (
              <>
                <div className="divider"/>

                    <label className="field-label">Maximum Marks <span>*</span></label>

                  <DocActionButtons
                    docId={offlineDocs.questionDocumentId}
                    downloadName={(meta?.exam_type||'test')+'_'+(meta?.subject||'paper')+'_questions.docx'}
                  />
                </div>
              )}
              {activeTab==='answerkey'&&(
                <div className="doc-actions-wrap">
                  <div className="doc-actions-label">Answer key document</div>
                  <DocActionButtons
                    docId={offlineDocs.keyDocumentId}
                    downloadName={(meta?.exam_type||'test')+'_'+(meta?.subject||'paper')+'_answer_key.docx'}
                  />
                </div>
              )}
            </div>

            <div className="offline-success">
              <div className="offline-success-info">
                <div className="offline-success-icon">✅</div>
                <div>
                  <div className="offline-success-title">Offline Test Ready</div>
                  <div className="offline-success-sub">Your Word documents have been generated successfully.</div>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* HOW IT WORKS */}
      <div className="how">
        <div className="how-title">HOW IT WORKS</div>
        <h2 className="how-h2">Three steps to a complete test</h2>
        <div className="how-grid">
          {[
            {n:'01',icon:'🎯',title:'Configure',desc:'Select class, subject, chapters, topics and question type. Set difficulty level and number of questions.'},
            {n:'02',icon:'⚡',title:'Generate',desc:'AI creates syllabus-aligned questions matched to your chosen question type, with answer key and explanations in 30 seconds.'},
            {n:'03',icon:'📋',title:'Deliver',desc:'One click creates a timed Google Form quiz or a printable Word document. Share the link or hand out papers.'}
          ].map(c=>(
            <div key={c.n} className="how-card">
              <div className="how-n">{c.n}</div>
              <div className="how-icon">{c.icon}</div>
              <div className="how-ct">{c.title}</div>
              <div className="how-cp">{c.desc}</div>
            </div>
          ))}
        </div>
      </div>

      {/* FOOTER */}
      <footer className="footer">
        <div className="footer-l">myTST — CBSE School Test Generator · testgenbud@gmail.com</div>
        <div className="footer-r">
          <span className="nav-dot"/>
          <span>SYSTEM ONLINE</span>
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
