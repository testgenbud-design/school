<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TestGen AI — CBSE Test Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0b1220;
  color: white;
  padding: 40px;
}
button {
  padding: 12px 18px;
  background: orange;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const W1 = "https://testgenbud.app.n8n.cloud/webhook/test-request";
const W2 = "https://testgenbud.app.n8n.cloud/webhook/88784932-ca43-4740-9718-091d8beb1575";

function App(){

  const [loading,setLoading] = React.useState(false);
  const [formLoading,setFormLoading] = React.useState(false);
  const [result,setResult] = React.useState(null);
  const [meta,setMeta] = React.useState(null);
  const [formData,setFormData] = React.useState(null);
  const [error,setError] = React.useState("");
  const [formError,setFormError] = React.useState("");

  // -------- GENERATE TEST --------
  async function generate(){

    setLoading(true);
    setError("");
    setFormData(null);

    try{
      const res = await fetch(W1,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          exam_type: "Class 10",
          subject: "Science",
          chapters: ["Life Processes"],
          topics: ["Nutrition"],
          difficulty: "Easy",
          num_questions: 5
        })
      });

      if(!res.ok) throw new Error("Generation failed");

      const data = await res.json();

      setResult(data.generated_text);
      setMeta({
        test_id: data.test_id
      });

    }catch(e){
      setError(e.message);
    }

    setLoading(false);
  }

  // -------- CREATE GOOGLE FORM --------
  async function createForm(){

    if(!meta?.test_id){
      setFormError("Missing test_id");
      return;
    }

    setFormLoading(true);
    setFormError("");

    try{

      const res = await fetch(W2,{
        method:'POST',
        headers:{
          'Content-Type':'application/json'
        },
        body: JSON.stringify({
          test_id: meta.test_id   // ✅ FIXED
        })
      });

      if(!res.ok){
        throw new Error(`Server error ${res.status}`);
      }

      const data = await res.json();

      setFormData({
        form_link: data.form_link,
        total_questions: data.total_questions
      });

    }catch(e){
      setFormError("Form creation failed: " + e.message);
    }

    setFormLoading(false);
  }

  return(
    <div>

      <h1>TestGen AI</h1>

      <button onClick={generate}>
        {loading ? "Generating..." : "Generate Test"}
      </button>

      {error && <p style={{color:"red"}}>{error}</p>}

      {result && (
        <>
          <pre style={{marginTop:"20px"}}>{result}</pre>

          <button onClick={createForm} style={{marginTop:"20px"}}>
            {formLoading ? "Creating Form..." : "Create Google Form"}
          </button>
        </>
      )}

      {formData && (
        <div style={{marginTop:"20px"}}>
          <a href={formData.form_link} target="_blank">
            Open Google Form
          </a>
          <p>{formData.total_questions} questions</p>
        </div>
      )}

      {formError && <p style={{color:"red"}}>{formError}</p>}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
